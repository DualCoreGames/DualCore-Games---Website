<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tsParticles Test</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #tsparticles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let options = {
                particles: {
                    number: { value: 90 },
                    color: { value: "#00d4ff" },
                    links: { enable: true, distance: 160, color: "#00d4ff", opacity: 0.35, width: 1 },
                    move: { enable: true, speed: 0.6, direction: "none", outModes: { default: "out" } },
                    size: { value: 2.2 },
                    opacity: { value: 0.65 }
                },
                interactivity: {
                    events: { onHover: { enable: true, mode: "grab" } },
                    modes: { grab: { distance: 220, links: { opacity: 0.5 } } }
                },
                detectRetina: true
            };
            tsParticles.load({ id: "tsparticles", options: options }).then(() => {
                console.log("loaded");
            });
        });
    </script>
</body>
</html>
